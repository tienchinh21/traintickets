name: API CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "api/**"
      - ".github/workflows/api-ci.yml"
  push:
    branches:
      - dev
    paths:
      - "api/**"
      - ".github/workflows/api-ci.yml"
  workflow_dispatch:

concurrency:
  group: api-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-ci:
    name: Lint, test, and build API
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run lint
        run: npm run lint:check

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test:ci

      - name: Build API
        run: npm run build

